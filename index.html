<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0b0b0f">
  <title>Word Recorder</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <div id="stage">
      <video id="preview" autoplay playsinline muted></video>
      <canvas id="playback" hidden></canvas>

      <div id="words" hidden>
        <span></span>
        <span></span>
        <span></span>
      </div>

      <div id="rec-indicator" hidden><i></i><span>0:00</span></div>
      <div id="hint" hidden>Say the words out loud, then tap stop</div>
      <div id="status" hidden></div>
    </div>

    <div id="controls">
      <!-- live -->
      <button id="btn-shuffle" class="side" title="New words" hidden>&#127922;</button>
      <button id="btn-record" hidden><i></i></button>
      <button id="btn-flip" class="side" title="Flip camera" hidden>&#8635;</button>
      <!-- review -->
      <button id="btn-reverse" class="pill" hidden><i>&#9664;</i><span>Reverse</span></button>
      <button id="btn-redo" class="side" title="Redo same words" hidden>&#8634;</button>
      <button id="btn-retake" class="side" title="Record again" hidden>&#10005;</button>
      <button id="btn-save" class="side" title="Save video" hidden>&#10515;</button>
      <button id="btn-forward" class="pill" hidden><span>Play</span><i>&#9654;</i></button>
    </div>

    <div id="gate">
      <h1>Word Recorder</h1>
      <p>Read the words on screen while recording yourself,<br>then watch it back — forwards or in reverse.</p>
      <button id="btn-start">Start camera</button>
      <div id="gate-footer"></div>
    </div>
  </div>

  <script src="words.js"></script>
  <script src="app.js"></script>
</body>
</html>
